<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="MooM的空闲时间表，展示从今天开始两周内可预约时间。" />
    <title>MooM的空闲时间表</title>
    <link rel="stylesheet" href="./style.css?v=blue-theme" />
  </head>
  <body>
    <header class="page-header">
      <a class="brand" href="./" aria-label="MooM的空闲时间表">
        <span class="brand-mark">M</span>
        <span>MooM</span>
      </a>
      <div class="header-meta">
        <span id="dateRange">两周空闲时间</span>
        <span id="allAvailableBadge">全部空闲</span>
      </div>
    </header>

    <main>
      <section class="schedule-title" aria-labelledby="page-title">
        <p>Free Time Schedule</p>
        <h1 id="page-title">MooM的空闲时间表</h1>
      </section>

      <section class="schedule-panel" aria-labelledby="schedule-title">
        <div class="panel-heading">
          <div>
            <p>2 Weeks</p>
            <h2 id="schedule-title">预约时间</h2>
          </div>
          <div class="status-key" aria-label="预约状态">
            <span>空闲</span>
          </div>
        </div>

        <div class="table-wrap" tabindex="0">
          <table class="schedule-table" aria-label="MooM未来两周空闲时间表">
            <thead>
              <tr>
                <th rowspan="2" scope="col" class="date-column">日期</th>
                <th colspan="3" scope="colgroup">预约内容</th>
              </tr>
              <tr>
                <th scope="col">上午</th>
                <th scope="col">下午</th>
                <th scope="col">晚上</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </section>

      <section class="booking-panel" aria-labelledby="booking-title">
        <div class="panel-heading">
          <div>
            <p>Booking Request</p>
            <h2 id="booking-title">预约申请</h2>
          </div>
          <span class="booking-note">点击表格里的空闲时间，会自动填入日期和时间段。</span>
        </div>

        <form id="bookingForm" class="booking-form">
          <label>
            日期
            <input id="bookingDate" name="预约日期" type="text" placeholder="请选择日期" required />
          </label>
          <label>
            时间
            <input id="bookingTime" name="预约时间" type="text" placeholder="请选择时间段" required />
          </label>
          <label>
            预约人
            <input id="guestName" name="预约人" type="text" placeholder="请输入姓名" required />
          </label>
          <label>
            联系方式
            <input id="guestContact" name="联系方式" type="text" placeholder="微信、LINE、邮箱或电话" required />
          </label>
          <label class="wide-field">
            预约内容
            <textarea id="bookingMessage" name="预约内容" rows="4" placeholder="请简单写一下想预约的内容"></textarea>
          </label>
          <button class="submit-button" type="submit">提交预约申请</button>
          <p class="privacy-note">预约信息只用于通知 MooM，不会公开显示在网页上。</p>
          <p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>

        <div id="bookingResult" class="booking-result" hidden>
          <h3>预约信息</h3>
          <textarea id="bookingOutput" readonly rows="8"></textarea>
          <div class="result-actions">
            <button id="copyBooking" class="secondary-button" type="button">复制预约信息</button>
            <a id="gmailLink" class="secondary-button primary-link" href="#" target="_blank" rel="noopener">备用：打开 Gmail 发送</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <span>MooM的空闲时间表</span>
      <span id="updatedAt"></span>
    </footer>

    <script>
      const scheduleBody = document.querySelector("#scheduleBody");
      const dateRange = document.querySelector("#dateRange");
      const updatedAt = document.querySelector("#updatedAt");
      const bookingForm = document.querySelector("#bookingForm");
      const bookingDate = document.querySelector("#bookingDate");
      const bookingTime = document.querySelector("#bookingTime");
      const guestName = document.querySelector("#guestName");
      const guestContact = document.querySelector("#guestContact");
      const bookingMessage = document.querySelector("#bookingMessage");
      const formStatus = document.querySelector("#formStatus");
      const bookingResult = document.querySelector("#bookingResult");
      const bookingOutput = document.querySelector("#bookingOutput");
      const copyBooking = document.querySelector("#copyBooking");
      const gmailLink = document.querySelector("#gmailLink");
      const allAvailableBadge = document.querySelector("#allAvailableBadge");
      const NOTIFY_EMAIL = "shunyoutou@gmail.com";
      const BOOKING_API_URL = "https://script.google.com/macros/s/AKfycbxv3tDZsLSKvqfHEiNA6klPl4EQoQ8_x38QynKbtFHlrK6Lq0XC2878Fi8YK6FXyUQm/exec";
      const dayCount = 14;
      const timeSlots = ["上午", "下午", "晚上"];
      const weekNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      const bookedSlots = new Set();

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function formatDate(date) {
        return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())}`;
      }

      function addDays(date, days) {
        const next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
      }

      function appendMonthRow(fragment, date) {
        const row = document.createElement("tr");
        row.className = "month-row";
        row.innerHTML = `<th scope="rowgroup" colspan="4">${date.getFullYear()}年${date.getMonth() + 1}月</th>`;
        fragment.append(row);
      }

      function makeBookingKey(date, time) {
        return `${date}|${time}`;
      }

      function updateAvailabilityBadge() {
        allAvailableBadge.hidden = bookedSlots.size > 0;
      }

      function markSlotBooked(date, time) {
        const key = makeBookingKey(date, time);
        const button = document.querySelector(`[data-booking-key="${CSS.escape(key)}"]`);

        bookedSlots.add(key);
        updateAvailabilityBadge();

        if (!button) {
          return;
        }

        button.className = "booked-slot";
        button.textContent = "已预约";
        button.disabled = true;
        button.setAttribute("aria-label", `${date} ${time} 已预约`);
      }

      function handleBookingsLoaded(data) {
        if (!data || !Array.isArray(data.bookings)) {
          return;
        }

        data.bookings.forEach((booking) => {
          if (booking.date && booking.time) {
            markSlotBooked(booking.date, booking.time);
          }
        });
      }

      function loadBookings() {
        if (!BOOKING_API_URL) {
          return;
        }

        const callbackName = `handleMoomBookings_${Date.now()}`;
        const script = document.createElement("script");
        const url = new URL(BOOKING_API_URL);

        window[callbackName] = (data) => {
          handleBookingsLoaded(data);
          script.remove();
          delete window[callbackName];
        };

        url.searchParams.set("callback", callbackName);
        script.src = url.toString();
        script.onerror = () => {
          script.remove();
          delete window[callbackName];
        };
        document.body.append(script);
      }

      function buildSchedule() {
        const today = new Date();
        const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const end = addDays(start, dayCount);
        const fragment = document.createDocumentFragment();
        let cursor = new Date(start);
        let currentMonth = -1;

        scheduleBody.innerHTML = "";
        dateRange.textContent = `${formatDate(start)} - ${formatDate(addDays(end, -1))}`;
        updatedAt.textContent = `更新：${formatDate(start)}`;

        while (cursor < end) {
          if (cursor.getMonth() !== currentMonth) {
            currentMonth = cursor.getMonth();
            appendMonthRow(fragment, cursor);
          }

          const row = document.createElement("tr");
          const dateCell = document.createElement("th");
          const displayDate = formatDate(cursor);
          dateCell.scope = "row";
          dateCell.className = "date-column";
          dateCell.innerHTML = `<strong>${displayDate}</strong><span>${weekNames[cursor.getDay()]}</span>`;
          row.append(dateCell);

          timeSlots.forEach((time) => {
            const cell = document.createElement("td");
            const button = document.createElement("button");
            button.className = "available-slot";
            button.type = "button";
            button.textContent = "空闲";
            button.dataset.bookingKey = makeBookingKey(displayDate, time);
            button.setAttribute("aria-label", `${displayDate} ${time} 空闲`);
            button.addEventListener("click", () => {
              if (bookedSlots.has(makeBookingKey(displayDate, time))) {
                return;
              }

              bookingDate.value = displayDate;
              bookingTime.value = time;
              bookingForm.scrollIntoView({ behavior: "smooth", block: "start" });
              guestName.focus({ preventScroll: true });
              formStatus.textContent = `${displayDate} ${time} 已填入预约申请。`;
            });
            cell.append(button);
            row.append(cell);
          });

          fragment.append(row);
          cursor.setDate(cursor.getDate() + 1);
        }

        scheduleBody.append(fragment);
        updateAvailabilityBadge();
      }

      buildSchedule();
      loadBookings();

      function buildBookingPayload() {
        return {
          date: bookingDate.value,
          time: bookingTime.value,
          name: guestName.value.trim(),
          contact: guestContact.value.trim(),
          message: bookingMessage.value.trim() || "未填写",
          page: window.location.href,
        };
      }

      function buildBookingText(payload) {
        return [
          "收到新的预约申请：",
          "",
          `日期：${payload.date}`,
          `时间：${payload.time}`,
          `预约人：${payload.name}`,
          `联系方式：${payload.contact}`,
          `预约内容：${payload.message}`,
          "",
          "请及时确认预约。",
        ].join("\n");
      }

      function buildGmailUrl(subject, body) {
        const gmailUrl = new URL("https://mail.google.com/mail/");
        gmailUrl.searchParams.set("view", "cm");
        gmailUrl.searchParams.set("fs", "1");
        gmailUrl.searchParams.set("to", NOTIFY_EMAIL);
        gmailUrl.searchParams.set("su", subject);
        gmailUrl.searchParams.set("body", body);
        return gmailUrl.toString();
      }

      function showBackupResult(body, gmailUrl) {
        bookingOutput.value = body;
        gmailLink.href = gmailUrl;
        bookingResult.hidden = false;
        bookingResult.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      bookingForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = buildBookingPayload();
        const subject = `MooM预约申请：${payload.date} ${payload.time}`;
        const body = buildBookingText(payload);
        const gmailUrl = buildGmailUrl(subject, body);

        if (!BOOKING_API_URL) {
          showBackupResult(body, gmailUrl);
          formStatus.textContent = "自动邮件通知还没有配置。请先设置 Google Apps Script；现在可以使用下面的备用发送方式。";
          return;
        }

        formStatus.textContent = "正在提交预约申请...";

        try {
          await fetch(BOOKING_API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify(payload),
          });
          markSlotBooked(payload.date, payload.time);
          bookingForm.reset();
          bookingResult.hidden = true;
          formStatus.textContent = "预约申请已提交。MooM 会收到邮件通知。";
        } catch (error) {
          showBackupResult(body, gmailUrl);
          formStatus.textContent = "自动通知暂时失败。请复制预约信息，或用备用 Gmail 方式发送。";
        }
      });

      copyBooking.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(bookingOutput.value);
          formStatus.textContent = "预约信息已复制。";
        } catch (error) {
          bookingOutput.focus();
          bookingOutput.select();
          formStatus.textContent = "请手动复制下面的预约信息。";
        }
      });
    </script>
  </body>
</html>
